<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepAlpha 关系图谱</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 51% 12%, rgba(29, 161, 242, 0.16), transparent 24rem),
          radial-gradient(circle at 92% 94%, rgba(96, 165, 250, 0.1), transparent 18rem),
          linear-gradient(90deg, rgba(255, 255, 255, 0.012), transparent 19rem),
          var(--bg);
      }

      .graph-shell {
        min-height: 100vh;
        padding: 0;
      }

      .graph-nav {
        position: fixed;
      }

      .graph-hero {
        position: fixed;
        top: 7.25rem;
        left: 1.75rem;
        z-index: 3;
        display: grid;
        gap: 0.35rem;
        width: min(24rem, calc(100vw - 3.5rem));
        pointer-events: none;
      }

      .graph-hero h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(2.1rem, 4.6vw, 4.25rem);
        line-height: 0.9;
        letter-spacing: -0.03em;
        text-transform: uppercase;
      }

      .graph-frame-wrap {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        min-height: 100vh;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .graph-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: transparent;
      }

      .graph-fallback {
        position: absolute;
        inset: auto 1rem 1rem 1rem;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.85rem 1rem;
        border: 1px solid rgba(29, 161, 242, 0.2);
        border-radius: 0.7rem;
        background: rgba(8, 10, 12, 0.92);
        color: #aab2bd;
        backdrop-filter: blur(18px);
      }

      .graph-fallback.visible {
        display: flex;
      }

      .graph-fallback strong {
        color: #f4f5f4;
      }

      .graph-fallback code {
        color: #9fd8ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.82rem;
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .graph-shell {
          padding: 0;
        }

        .graph-nav {
          position: fixed;
          justify-content: flex-start;
        }

        .graph-hero {
          display: none;
        }

        .graph-frame-wrap {
          height: 100vh;
        }

        .graph-fallback {
          display: none;
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="graph-shell">
      <nav class="home-nav graph-nav" aria-label="DeepAlpha 图谱导航">
        <a class="nav-pill" href="./index.html">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 11.5 12 4l9 7.5"></path>
              <path d="M5 10.5V20h14v-9.5"></path>
              <path d="M9 20v-6h6v6"></path>
            </svg>
          </span>
          <span>Home</span>
        </a>
        <a class="nav-pill" href="./docs.html">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"></path>
              <path d="M14 2v5h5"></path>
              <path d="M9 13h6"></path>
              <path d="M9 17h4"></path>
            </svg>
          </span>
          <span>Docs</span>
        </a>
        <a class="nav-pill" href="./slides.html">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <path d="M8 12h8"></path>
              <path d="M8 15h5"></path>
            </svg>
          </span>
          <span>Slides</span>
        </a>
      </nav>

      <header class="graph-hero">
        <h1>Signal<br />Graph</h1>
      </header>

      <main class="graph-frame-wrap" aria-label="DeepAlpha 关系图谱服务">
        <iframe class="graph-frame" id="graphFrame" src="http://localhost:8080/" title="DeepAlpha 关系图谱"></iframe>
        <div class="graph-fallback" id="graphFallback">
          <strong>图谱服务未连接</strong>
          <code>python3 graph_viewer.py --port 8080</code>
        </div>
      </main>
    </div>

    <script>
      const fallback = document.getElementById("graphFallback");

      async function checkGraphService() {
        try {
          const response = await fetch("http://localhost:8080/api/graph", { cache: "no-store" });
          if (!response.ok) throw new Error("Graph service unavailable");
          await response.json();
          fallback.classList.remove("visible");
        } catch (_) {
          fallback.classList.add("visible");
        }
      }

      checkGraphService();
      window.setInterval(checkGraphService, 5000);
    </script>
  </body>
</html>
